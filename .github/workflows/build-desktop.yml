# Build EasyBook untuk Windows (.msi) dan macOS (.dmg).
# Unduh hasilnya: GitHub repo → Actions → run terbaru → Artifacts.
#
# Dokumentasi: https://v2.tauri.app/distribute/pipelines/github/

name: Build desktop

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            artifact_name: macos-aarch64
          - platform: windows-latest
            args: ""
            artifact_name: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps (skip on macOS/Windows)
        if: false
        run: echo "not used"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node (for tooling)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: EasyBook v__VERSION__
          releaseBody: Build otomatis dari GitHub Actions.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload bundle folder (backup artifact)
        uses: actions/upload-artifact@v4
        with:
          name: easybook-${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: error
